<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Risk Tolerance Predictor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background"></div>
    <div class="container text-center">
        <div class="form-container shadow-lg p-4 mt-5 bg-white rounded">
            <h1 class="mb-4">True Risk Tolerance Predictor</h1>
            <form action="/predict" method="post" class="needs-validation">
                <div class="mb-3">
                    <label for="AGE" class="form-label">Age:</label>
                    <input type="number" class="form-control" id="AGE" name="AGE" placeholder="Enter your age" required>
                </div>

                <div class="mb-3">
                    <label for="EDUC" class="form-label">Education Level:</label>
                    <input type="number" class="form-control" id="EDUC" name="EDUC" placeholder="Enter your education level" required>
                </div>

                <div class="mb-3">
                    <label for="MARRIED" class="form-label">Marital Status:</label>
                    <select class="form-select" id="MARRIED" name="MARRIED" required>
                        <option value="Married or With a Partner">Married or With a Partner</option>
                        <option value="Unmarried and Not with a Partner">Unmarried and Not with a Partner</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="OCCAT1" class="form-label">Occupation Category:</label>
                    <select class="form-select" id="OCCAT1" name="OCCAT1" required>
                        <option value="Manager Level">Manager Level</option>
                        <option value="Mid-Level">Mid-Level</option>
                        <option value="Entry Level">Entry Level</option>
                        <option value="Unemployed">Unemployed</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="KIDS" class="form-label">Number of Kids:</label>
                    <input type="number" class="form-control" id="KIDS" name="KIDS" placeholder="Enter number of kids" required>
                </div>

                <div class="mb-3">
                    <label for="NETWORTH" class="form-label">Net Worth:</label>
                    <input type="text" class="form-control" id="NETWORTH" name="NETWORTH" placeholder="e.g., 1,000,000" required>
                </div>

                <div class="mb-3">
                    <label for="INCOME" class="form-label">Income:</label>
                    <input type="text" class="form-control" id="INCOME" name="INCOME" placeholder="e.g., 50,000" required>
                </div>

                <div class="mb-3">
                    <label for="YESFINRISK" class="form-label">Do you like to take financial risks?</label>
                    <select class="form-select" id="YESFINRISK" name="YESFINRISK" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="DEBT" class="form-label">Debt:</label>
                    <input type="text" class="form-control" id="DEBT" name="DEBT" placeholder="e.g., 15,000" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg">Submit</button>
            </form>
            <div class="output mt-4">
                <h2>{{ prediction_text }}</h2>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
